# Auto-loaded by `docker compose up` (merged with docker-compose.yml).
# Dev: bind mounts, Vite on :3000, uvicorn --reload.
# Production-only: rename or delete this file, then `docker compose up`.

services:
  frontend:
    build:
      context: ..
      dockerfile: bdsa_protocols/frontend/Dockerfile.dev
    volumes:
      - ./frontend:/app
      - ../bdsa-react-components:/bdsa-react-components:ro
      - /app/node_modules
    ports: !override
      - "3000:3000"
      - "3001:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - BDSA_COMPONENTS_ROOT=/bdsa-react-components
      - VITE_API_PROXY_TARGET=http://backend:8000
      # When using an HTTPS reverse proxy (e.g. schema.bdsa.io), set in .env:
      # VITE_HMR_HOST=schema.bdsa.io
      # VITE_HMR_CLIENT_PORT=443
      # VITE_HMR_PROTOCOL=wss
      - VITE_HMR_HOST=${VITE_HMR_HOST:-localhost}
      - VITE_HMR_CLIENT_PORT=${VITE_HMR_CLIENT_PORT:-3000}
      - VITE_HMR_PROTOCOL=${VITE_HMR_PROTOCOL:-}
      - VITE_BDSA_API_KEY=${BDSA_API_KEY:-}

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile.dev
    volumes:
      - ./admin:/app
      - /app/node_modules
    ports:
      - "3003:3002"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_BDSA_API_KEY=${BDSA_API_KEY:-}

  backend:
    volumes:
      - ./backend/app:/app/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    env_file:
      - .env
    environment:
      BDSA_MONGODB_URL: "mongodb://mongodb:27017"
      BDSA_MONGODB_DB: "bdsa_protocols"
